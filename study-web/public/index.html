<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>系統設計陪讀座艙</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --panel: #161922; --panel-2: #1d212c; --border: #2a2f3a;
    --fg: #e6e8ee; --muted: #9aa3b2; --accent: #6ea8fe; --accent-soft: #2a3550;
    --term: #ffd479; --term-line: #6b5a2e; --user: #2a3550; --bot: #1d212c;
    --code-bg: #0b0d12;
  }
  html[data-theme="light"] {
    --bg: #f5f6f8; --panel: #ffffff; --panel-2: #f0f2f6; --border: #d9dde5;
    --fg: #1c2128; --muted: #5a6473; --accent: #2f6fed; --accent-soft: #e4ecff;
    --term: #8a5a00; --term-line: #d8b86a; --user: #e4ecff; --bot: #f0f2f6;
    --code-bg: #f0f2f6;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg); display: flex; flex-direction: column;
    font: 15px/1.65 -apple-system, "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 8px 16px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex: none;
  }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: .3px; }
  header .spacer { flex: 1; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #d05050; transition: background .2s; }
  .dot.on { background: #3fb950; }
  .status { font-size: 12px; color: var(--muted); }
  button.icon {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 13px;
  }
  button.icon:hover { border-color: var(--accent); }

  main { flex: 1; min-height: 0; display: grid; grid-template-columns: 1.55fr 1fr; }
  section { min-width: 0; min-height: 0; display: flex; flex-direction: column; }
  #reading { border-right: 1px solid var(--border); }
  .panel-head { padding: 9px 18px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: .8px; flex: none; display: flex; gap: 8px; align-items: baseline; }
  .panel-head b { color: var(--fg); text-transform: none; font-size: 14px; letter-spacing: 0; font-weight: 600; }

  #notes { overflow-y: auto; padding: 22px 28px 60px; }
  #notes.empty, #log.empty { color: var(--muted); display: flex; align-items: center; justify-content: center;
    text-align: center; height: 100%; padding: 32px; }
  #notes h1 { font-size: 24px; margin: .2em 0 .5em; }
  #notes h2 { font-size: 19px; margin: 1.3em 0 .5em; padding-bottom: .2em; border-bottom: 1px solid var(--border); }
  #notes h3 { font-size: 16px; margin: 1.1em 0 .4em; }
  #notes p, #notes li { margin: .45em 0; }
  #notes code { background: var(--code-bg); padding: .12em .4em; border-radius: 4px; font-size: .9em; }
  #notes pre { background: var(--code-bg); padding: 12px 14px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
  #notes pre code { background: none; padding: 0; }
  #notes table { border-collapse: collapse; margin: .8em 0; width: 100%; }
  #notes th, #notes td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  #notes th { background: var(--panel-2); }
  #notes blockquote { margin: .6em 0; padding: .2em 1em; border-left: 3px solid var(--accent); color: var(--muted); }
  .mermaid { background: transparent; margin: 1em 0; text-align: center; }

  .term {
    color: var(--term); border-bottom: 1.5px dotted var(--term-line); cursor: pointer;
    border-radius: 2px; padding: 0 1px;
  }
  .term:hover, .term:focus { background: var(--accent-soft); outline: none; }

  #chat { background: var(--panel); }
  #log { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 12px; }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble { max-width: 88%; padding: 9px 13px; border-radius: 12px; background: var(--bot);
    border: 1px solid var(--border); overflow-wrap: anywhere; }
  .msg.user .bubble { background: var(--user); border-color: var(--accent-soft); }
  .msg.system .bubble { background: transparent; border: none; color: var(--muted); font-size: 12.5px; font-style: italic; max-width: 100%; text-align: center; margin: 0 auto; }
  .bubble > :first-child { margin-top: 0; } .bubble > :last-child { margin-bottom: 0; }
  .bubble h1,.bubble h2,.bubble h3 { font-size: 15px; margin: .5em 0 .3em; }
  .bubble pre { background: var(--code-bg); padding: 10px; border-radius: 7px; overflow-x: auto; }
  .bubble code { background: var(--code-bg); padding: .1em .3em; border-radius: 4px; }
  .bubble table { border-collapse: collapse; } .bubble th,.bubble td { border: 1px solid var(--border); padding: 4px 8px; }

  form { flex: none; display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: var(--panel); }
  #input { flex: 1; resize: none; background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 12px; font: inherit; min-height: 42px; max-height: 160px; }
  #input:focus { outline: none; border-color: var(--accent); }
  form button[type=submit] { background: var(--accent); color: #fff; border: none; border-radius: 9px;
    padding: 0 18px; cursor: pointer; font-weight: 600; }
  form button[type=submit]:hover { filter: brightness(1.08); }

  #card {
    display: none; position: fixed; z-index: 50; max-width: 360px; min-width: 220px;
    background: var(--panel-2); border: 1px solid var(--accent); border-radius: 12px;
    padding: 13px 15px; box-shadow: 0 10px 32px rgba(0,0,0,.45);
  }
  #card .card-term { font-weight: 700; color: var(--term); margin-bottom: 6px; }
  #card .card-body { font-size: 14px; }
  #card .card-deeper { margin-top: 11px; background: var(--accent); color: #fff; border: none;
    border-radius: 7px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  #card .card-deeper:hover { filter: brightness(1.08); }
</style>
</head>
<body>
<header>
  <h1>系統設計陪讀座艙</h1>
  <span class="dot" id="dot"></span><span class="status" id="status">連線中…</span>
  <span class="spacer"></span>
  <button class="icon" id="theme">☀ / ☾</button>
</header>

<main>
  <section id="reading">
    <div class="panel-head">講義 <b id="notesTitle"></b></div>
    <div id="notes" class="empty">在右邊輸入「上 03_基本觀念/04. CAP Theorem｜CAP 定理」之類的指令,我就把那一課重寫成可點筆記放這裡。</div>
  </section>
  <section id="chat">
    <div class="panel-head">聊天</div>
    <div id="log" class="empty">跟教練對話。看不懂的術語,點左邊筆記裡橘色的字。</div>
    <form id="form">
      <textarea id="input" placeholder="問問題,或「上 X 課」… (Enter 送出, Shift+Enter 換行)" autofocus></textarea>
      <button type="submit">送出</button>
    </form>
  </section>
</main>

<div id="card">
  <div class="card-term" id="cardTerm"></div>
  <div class="card-body" id="cardBody"></div>
  <button class="card-deeper" id="cardDeeper">在課程脈絡中深入 →</button>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const GLOSS = {};                       // 全域術語表 (notes + chat 累積)
const TERM_RE = /\[\[([\w-]+)(?:\|([^\]]+))?\]\]/g;

// ---------- theme ----------
const savedTheme = localStorage.getItem("sw-theme") || "dark";
document.documentElement.dataset.theme = savedTheme;
function mermaidTheme() { return document.documentElement.dataset.theme === "light" ? "default" : "dark"; }
$("theme").onclick = () => {
  const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("sw-theme", next);
  mermaid.initialize({ startOnLoad: false, theme: mermaidTheme(), securityLevel: "strict" });
};

marked.setOptions({ gfm: true, breaks: true });
mermaid.initialize({ startOnLoad: false, theme: mermaidTheme(), securityLevel: "strict" });

// ---------- markdown / glossary / mermaid / terms ----------
function renderMarkdown(md, inline) {
  const dirty = inline ? marked.parseInline(md || "") : marked.parse(md || "");
  return DOMPurify.sanitize(dirty, { ADD_ATTR: ["target"] });
}

function extractGlossary(md) {
  const m = (md || "").match(/```glossary\s*\n([\s\S]*?)```/);
  if (!m) return { rest: md || "" };
  try { Object.assign(GLOSS, JSON.parse(m[1])); }
  catch (e) { console.warn("glossary JSON parse failed:", e); }
  return { rest: md.slice(0, m.index) + md.slice(m.index + m[0].length) };
}

function hydrateMermaid(root) {
  const nodes = [];
  root.querySelectorAll("pre > code.language-mermaid").forEach(code => {
    const div = document.createElement("div");
    div.className = "mermaid";
    div.textContent = code.textContent;       // raw source (entities decoded)
    code.parentElement.replaceWith(div);
    nodes.push(div);
  });
  if (nodes.length) { try { mermaid.run({ nodes }); } catch (e) { console.warn("mermaid:", e); } }
}

function hydrateTerms(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      if (!n.nodeValue || n.nodeValue.indexOf("[[") < 0) return NodeFilter.FILTER_REJECT;
      for (let p = n.parentElement; p && p !== root; p = p.parentElement) {
        const tag = p.tagName;
        if (tag === "CODE" || tag === "PRE" || tag === "SCRIPT" || tag === "STYLE" ||
            p.classList.contains("mermaid") || p.classList.contains("term"))
          return NodeFilter.FILTER_REJECT;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const targets = [];
  while (walker.nextNode()) targets.push(walker.currentNode);
  targets.forEach(node => {
    const text = node.nodeValue;
    TERM_RE.lastIndex = 0;
    if (!TERM_RE.test(text)) return;
    TERM_RE.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = TERM_RE.exec(text))) {
      const [full, id, surface] = m;
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const label = surface || (GLOSS[id] && GLOSS[id].term) || id;
      if (GLOSS[id]) {
        const span = document.createElement("span");
        span.className = "term";
        span.dataset.defId = id;
        span.tabIndex = 0;
        span.setAttribute("role", "button");
        span.textContent = label;
        frag.appendChild(span);
      } else {
        frag.appendChild(document.createTextNode(label));
      }
      last = m.index + full.length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  });
}

// ---------- reading panel ----------
function renderNotes(markdown, lesson) {
  const { rest } = extractGlossary(markdown);
  $("notesTitle").textContent = lesson || "";
  const notes = $("notes");
  notes.classList.remove("empty");
  notes.innerHTML = renderMarkdown(rest, false);
  hydrateMermaid(notes);
  hydrateTerms(notes);
  notes.scrollTop = 0;
}

// ---------- chat panel ----------
const log = $("log");
function clearEmpty() { log.classList.remove("empty"); }
function scrollLog() { log.scrollTop = log.scrollHeight; }
function addUser(text) {
  clearEmpty();
  const row = document.createElement("div"); row.className = "msg user";
  const b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  row.appendChild(b); log.appendChild(row); scrollLog();
}
function addAssistant(text) {
  clearEmpty();
  const { rest } = extractGlossary(text);
  const row = document.createElement("div"); row.className = "msg bot";
  const b = document.createElement("div"); b.className = "bubble";
  b.innerHTML = renderMarkdown(rest, false);
  row.appendChild(b); log.appendChild(row);
  hydrateMermaid(b); hydrateTerms(b); scrollLog();
}
function addSystem(text) {
  clearEmpty();
  const row = document.createElement("div"); row.className = "msg system";
  const b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  row.appendChild(b); log.appendChild(row); scrollLog();
}

// ---------- term card ----------
const card = $("card");
function openCard(id, anchor) {
  const def = GLOSS[id]; if (!def) return;
  $("cardTerm").textContent = def.term || id;
  const body = $("cardBody");
  body.innerHTML = renderMarkdown(def.short || "", true);
  hydrateTerms(body);
  $("cardDeeper").onclick = () => {
    const term = def.term || id;
    const q = def.deeper || ("請深入解釋:" + term);
    addUser("🔎 " + term);
    wsSend({ type: "ask", mode: "deeper", term, question: q });
    closeCard();
  };
  card.style.display = "block";
  const r = anchor.getBoundingClientRect();
  const cw = card.offsetWidth, ch = card.offsetHeight;
  let left = r.left, top = r.bottom + 6;
  if (left + cw > innerWidth - 8) left = innerWidth - cw - 8;
  if (top + ch > innerHeight - 8) top = r.top - ch - 6;
  card.style.left = Math.max(8, left) + "px";
  card.style.top = Math.max(8, top) + "px";
}
function closeCard() { card.style.display = "none"; }

document.addEventListener("click", e => {
  const t = e.target.closest(".term");
  if (t) { openCard(t.dataset.defId, t); e.stopPropagation(); return; }
  if (!e.target.closest("#card")) closeCard();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeCard(); return; }
  const a = document.activeElement;
  if ((e.key === "Enter" || e.key === " ") && a && a.classList && a.classList.contains("term")) {
    e.preventDefault(); openCard(a.dataset.defId, a);
  }
});

// ---------- websocket ----------
let ws = null, ackTimer = null;
function setStatus(on) {
  $("dot").classList.toggle("on", on);
  $("status").textContent = on ? "已連線" : "已斷線,重連中…";
}
function startAck() {
  clearAck();
  ackTimer = setTimeout(() => addSystem(
    "（還沒收到回應 — 請確認你是用 study-coach.cmd 啟動的 session,且已批准 study-web 頻道與工具權限)"
  ), 15000);
}
function clearAck() { if (ackTimer) { clearTimeout(ackTimer); ackTimer = null; } }
function wsSend(o) {
  if (ws && ws.readyState === 1) { ws.send(JSON.stringify(o)); startAck(); }
  else addSystem("尚未連上座艙伺服器,正在重連…");
}
function connect() {
  ws = new WebSocket("ws://" + location.host + "/ws");
  ws.onopen = () => setStatus(true);
  ws.onclose = () => { setStatus(false); setTimeout(connect, 1500); };
  ws.onerror = () => { try { ws.close(); } catch (_) {} };
  ws.onmessage = e => {
    let m; try { m = JSON.parse(e.data); } catch (_) { return; }
    if (m.type === "msg" && m.from === "assistant") { clearAck(); addAssistant(m.text); }
    else if (m.type === "notes") { clearAck(); renderNotes(m.markdown, m.lesson); }
  };
}
connect();

// ---------- input ----------
const form = $("form"), input = $("input");
form.onsubmit = e => {
  e.preventDefault();
  const text = input.value.trim(); if (!text) return;
  input.value = ""; input.style.height = "";
  addUser(text);
  wsSend({ type: "ask", text });
};
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
input.addEventListener("input", () => {
  input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px";
});
</script>
</body>
</html>
