<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>系統設計陪讀座艙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0b0d13; --panel: #10131b; --panel-2: #171b26; --border: #252b3a;
    --fg: #e8eaf1; --muted: #98a1b3; --accent: #7c9cff; --accent-2: #9d7cff;
    --accent-soft: #232c47; --term: #ffc66d; --term-line: #6b5a2e;
    --user-bg: linear-gradient(135deg, #2b3a66, #33305e); --bot: #171b26;
    --code-bg: #0a0c11; --ok: #3fb950; --bad: #e5534b;
    --shadow: 0 12px 36px rgba(0,0,0,.5);
  }
  html[data-theme="light"] {
    --bg: #f2f4f8; --panel: #ffffff; --panel-2: #f4f6fa; --border: #dde2ec;
    --fg: #1b2027; --muted: #5d6776; --accent: #3b66e0; --accent-2: #7350d6;
    --accent-soft: #e7edff; --term: #8a5a00; --term-line: #d8b86a;
    --user-bg: linear-gradient(135deg, #e3eaff, #ece6ff); --bot: #f4f6fa;
    --code-bg: #eef1f6;
    --shadow: 0 12px 36px rgba(30,40,70,.18);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg); display: flex; flex-direction: column;
    font: 15px/1.7 "Noto Sans TC", -apple-system, "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent-soft); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 14px; padding: 10px 18px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex: none;
  }
  header h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: .4px; }
  header h1 .logo { margin-right: 6px; }
  header .spacer { flex: 1; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 3px 11px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bad); transition: background .2s; }
  .dot.on { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  button.icon {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 11px; cursor: pointer; font-size: 13px; transition: border-color .15s;
  }
  button.icon:hover { border-color: var(--accent); }

  main { flex: 1; min-height: 0; display: grid; grid-template-columns: 1.55fr 1fr; }
  section { min-width: 0; min-height: 0; display: flex; flex-direction: column; }
  #reading { border-right: 1px solid var(--border); }
  .panel-head {
    padding: 9px 20px; font-size: 11.5px; color: var(--muted); border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 1px; flex: none; display: flex; gap: 10px; align-items: baseline;
  }
  .panel-head b { color: var(--fg); text-transform: none; font-size: 13.5px; letter-spacing: 0; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---------- reading panel ---------- */
  #notes { overflow-y: auto; padding: 26px 32px 80px; scroll-behavior: smooth; }
  #notes.empty { color: var(--muted); display: flex; align-items: center; justify-content: center;
    text-align: center; height: 100%; padding: 32px; }
  #notes .doc { max-width: 840px; margin: 0 auto; }
  #notes h1 { font-size: 26px; line-height: 1.35; margin: .2em 0 .6em; letter-spacing: .3px; }
  #notes h2 {
    font-size: 19px; margin: 1.6em 0 .55em; padding-left: 12px;
    border-left: 4px solid var(--accent); border-radius: 2px;
  }
  #notes h3 { font-size: 16px; margin: 1.2em 0 .4em; color: var(--accent); }
  #notes p, #notes li { margin: .5em 0; }
  #notes li::marker { color: var(--accent); }
  #notes code { background: var(--code-bg); padding: .12em .45em; border-radius: 5px; font-size: .88em; }
  #notes pre { background: var(--code-bg); padding: 13px 16px; border-radius: 10px; overflow-x: auto; border: 1px solid var(--border); }
  #notes pre code { background: none; padding: 0; }
  #notes table { border-collapse: separate; border-spacing: 0; margin: 1em 0; width: 100%;
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  #notes th, #notes td { border-bottom: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  #notes td:not(:last-child), #notes th:not(:last-child) { border-right: 1px solid var(--border); }
  #notes tr:last-child td { border-bottom: none; }
  #notes th { background: var(--panel-2); font-weight: 600; }
  #notes tbody tr:nth-child(even) { background: color-mix(in srgb, var(--panel-2) 45%, transparent); }
  #notes blockquote {
    margin: .8em 0; padding: .55em 1.1em; border-left: 3px solid var(--accent);
    background: var(--panel-2); border-radius: 0 10px 10px 0; color: var(--muted);
  }
  .mermaid { background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    margin: 1.1em 0; padding: 14px 8px; text-align: center; }

  .term {
    color: var(--term); border-bottom: 1.5px dotted var(--term-line); cursor: pointer;
    border-radius: 3px; padding: 0 1px; transition: background .12s;
  }
  .term:hover, .term:focus { background: var(--accent-soft); outline: none; }

  /* ---------- welcome screen ---------- */
  #notes.welcome { display: block; }
  .wel { max-width: 720px; margin: 18px auto 0; }
  .wel-hero { text-align: center; margin-bottom: 26px; }
  .wel-hero .big { font-size: 40px; line-height: 1; }
  .wel-hero h1 { font-size: 24px; margin: 12px 0 6px; }
  .wel-hero p { color: var(--muted); margin: 0; font-size: 14px; }
  .wel details {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    margin: 10px 0; overflow: hidden;
  }
  .wel summary {
    cursor: pointer; padding: 11px 16px; font-weight: 600; list-style: none;
    display: flex; align-items: center; gap: 10px; user-select: none;
  }
  .wel summary::-webkit-details-marker { display: none; }
  .wel summary .tri { color: var(--muted); font-size: 11px; transition: transform .15s; }
  .wel details[open] summary .tri { transform: rotate(90deg); }
  .wel summary:hover { background: var(--panel-2); }
  .wel summary .chip { margin-left: auto; }
  .chip {
    font-size: 11.5px; color: var(--term); background: color-mix(in srgb, var(--term) 12%, transparent);
    border: 1px solid var(--term-line); border-radius: 999px; padding: 1px 9px; white-space: nowrap;
  }
  .lesson-list { border-top: 1px solid var(--border); padding: 6px; }
  .lesson-row {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    background: none; border: none; color: var(--fg); font: inherit; font-size: 14px;
    padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background .12s;
  }
  .lesson-row:hover { background: var(--accent-soft); }
  .lesson-row .chip { margin-left: auto; }
  .wel-hint { text-align: center; color: var(--muted); font-size: 12.5px; margin: 18px 0 30px; }

  /* ---------- chat panel ---------- */
  #chat { background: var(--panel); }
  #log { flex: 1; overflow-y: auto; padding: 18px 16px 8px; display: flex; flex-direction: column; gap: 12px; }
  #log.empty { color: var(--muted); display: flex; align-items: center; justify-content: center;
    text-align: center; height: 100%; padding: 32px; }
  .msg { display: flex; animation: rise .18s ease-out; }
  @keyframes rise { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 88%; padding: 10px 14px; border-radius: 14px; background: var(--bot);
    border: 1px solid var(--border); overflow-wrap: anywhere;
  }
  .msg.bot .bubble { border-bottom-left-radius: 5px; }
  .msg.user .bubble { background: var(--user-bg); border-color: var(--accent-soft); border-bottom-right-radius: 5px; }
  .msg.system .bubble { background: transparent; border: none; color: var(--muted); font-size: 12.5px;
    font-style: italic; max-width: 100%; text-align: center; margin: 0 auto; }
  .bubble > :first-child { margin-top: 0; } .bubble > :last-child { margin-bottom: 0; }
  .bubble h1,.bubble h2,.bubble h3 { font-size: 15px; margin: .5em 0 .3em; }
  .bubble pre { background: var(--code-bg); padding: 10px; border-radius: 8px; overflow-x: auto; }
  .bubble code { background: var(--code-bg); padding: .1em .3em; border-radius: 4px; font-size: .88em; }
  .bubble table { border-collapse: collapse; } .bubble th,.bubble td { border: 1px solid var(--border); padding: 4px 8px; }

  /* thinking indicator */
  .msg.thinking .bubble { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; }
  .dots { display: inline-flex; gap: 4px; }
  .dots i {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dots i:nth-child(2) { animation-delay: .15s; }
  .dots i:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: .45; } 30% { transform: translateY(-5px); opacity: 1; } }
  .think-hint { color: var(--muted); font-size: 11.5px; }

  /* ---------- input ---------- */
  form { flex: none; display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: var(--panel); }
  #input {
    flex: 1; resize: none; background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 11px; padding: 10px 13px; font: inherit; min-height: 44px; max-height: 160px;
    transition: border-color .15s, box-shadow .15s;
  }
  #input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
  form button[type=submit] {
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border: none;
    border-radius: 11px; padding: 0 19px; cursor: pointer; font-weight: 700; font-size: 14px; transition: filter .15s;
  }
  form button[type=submit]:hover { filter: brightness(1.12); }

  /* ---------- term card ---------- */
  #card {
    display: none; position: fixed; z-index: 50; max-width: 380px; min-width: 230px;
    background: var(--panel); border: 1px solid var(--accent); border-radius: 14px;
    padding: 14px 16px; box-shadow: var(--shadow); animation: pop .14s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }
  #card .card-term { font-weight: 700; color: var(--term); margin-bottom: 6px; font-size: 15px; }
  #card .card-body { font-size: 14px; line-height: 1.65; }
  #card .card-deeper {
    margin-top: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
    border: none; border-radius: 8px; padding: 6px 13px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  #card .card-deeper:hover { filter: brightness(1.12); }
</style>
</head>
<body>
<header>
  <h1><span class="logo">📚</span>系統設計陪讀座艙</h1>
  <span class="status-pill"><span class="dot" id="dot"></span><span id="status">連線中…</span></span>
  <span class="spacer"></span>
  <button class="icon" id="theme" title="切換深淺色">☀ / ☾</button>
</header>

<main>
  <section id="reading">
    <div class="panel-head">講義 <b id="notesTitle"></b></div>
    <div id="notes" class="empty">載入課程目錄中…</div>
  </section>
  <section id="chat">
    <div class="panel-head">聊天</div>
    <div id="log" class="empty">跟教練對話。看不懂的術語,點左邊筆記裡橘色的字。</div>
    <form id="form">
      <textarea id="input" placeholder="問問題,或「上 X 課」… (Enter 送出, Shift+Enter 換行)" autofocus></textarea>
      <button type="submit">送出</button>
    </form>
  </section>
</main>

<div id="card">
  <div class="card-term" id="cardTerm"></div>
  <div class="card-body" id="cardBody"></div>
  <button class="card-deeper" id="cardDeeper">在課程脈絡中深入 →</button>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const GLOSS = {};                       // 全域術語表 (notes + chat 累積)
const TERM_RE = /\[\[([\w-]+)(?:\|([^\]]+))?\]\]/g;
const FALLBACK_EMPTY = "在右邊輸入「上 03_基本觀念/04. CAP Theorem｜CAP 定理」之類的指令,我就把那一課重寫成可點筆記放這裡。";

// ---------- theme ----------
const savedTheme = localStorage.getItem("sw-theme") || "dark";
document.documentElement.dataset.theme = savedTheme;
function mermaidTheme() { return document.documentElement.dataset.theme === "light" ? "default" : "dark"; }
$("theme").onclick = () => {
  const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("sw-theme", next);
  mermaid.initialize({ startOnLoad: false, theme: mermaidTheme(), securityLevel: "strict" });
};

marked.setOptions({ gfm: true, breaks: true });
mermaid.initialize({ startOnLoad: false, theme: mermaidTheme(), securityLevel: "strict" });

// ---------- markdown / glossary / mermaid / terms ----------
function renderMarkdown(md, inline) {
  const dirty = inline ? marked.parseInline(md || "") : marked.parse(md || "");
  return DOMPurify.sanitize(dirty, { ADD_ATTR: ["target"] });
}

function extractGlossary(md) {
  const m = (md || "").match(/```glossary\s*\n([\s\S]*?)```/);
  if (!m) return { rest: md || "" };
  try { Object.assign(GLOSS, JSON.parse(m[1])); }
  catch (e) { console.warn("glossary JSON parse failed:", e); }
  return { rest: md.slice(0, m.index) + md.slice(m.index + m[0].length) };
}

function hydrateMermaid(root) {
  const nodes = [];
  root.querySelectorAll("pre > code.language-mermaid").forEach(code => {
    const div = document.createElement("div");
    div.className = "mermaid";
    div.textContent = code.textContent;       // raw source (entities decoded)
    code.parentElement.replaceWith(div);
    nodes.push(div);
  });
  if (nodes.length) { try { mermaid.run({ nodes }); } catch (e) { console.warn("mermaid:", e); } }
}

function hydrateTerms(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      if (!n.nodeValue || n.nodeValue.indexOf("[[") < 0) return NodeFilter.FILTER_REJECT;
      for (let p = n.parentElement; p && p !== root; p = p.parentElement) {
        const tag = p.tagName;
        if (tag === "CODE" || tag === "PRE" || tag === "SCRIPT" || tag === "STYLE" ||
            p.classList.contains("mermaid") || p.classList.contains("term"))
          return NodeFilter.FILTER_REJECT;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const targets = [];
  while (walker.nextNode()) targets.push(walker.currentNode);
  targets.forEach(node => {
    const text = node.nodeValue;
    TERM_RE.lastIndex = 0;
    if (!TERM_RE.test(text)) return;
    TERM_RE.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = TERM_RE.exec(text))) {
      const [full, id, surface] = m;
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const label = surface || (GLOSS[id] && GLOSS[id].term) || id;
      if (GLOSS[id]) {
        const span = document.createElement("span");
        span.className = "term";
        span.dataset.defId = id;
        span.tabIndex = 0;
        span.setAttribute("role", "button");
        span.textContent = label;
        frag.appendChild(span);
      } else {
        frag.appendChild(document.createTextNode(label));
      }
      last = m.index + full.length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  });
}

// ---------- reading panel ----------
let notesShown = false;     // true once real lesson notes are rendered (welcome must not overwrite)
function renderNotes(markdown, lesson) {
  const { rest } = extractGlossary(markdown);
  $("notesTitle").textContent = lesson || "";
  const notes = $("notes");
  notesShown = true;
  notes.classList.remove("empty", "welcome");
  const doc = document.createElement("div");
  doc.className = "doc";
  doc.innerHTML = renderMarkdown(rest, false);
  notes.innerHTML = "";
  notes.appendChild(doc);
  hydrateMermaid(doc);
  hydrateTerms(doc);
  notes.scrollTop = 0;
}

// ---------- welcome screen (lesson catalog) ----------
async function loadWelcome() {
  if (notesShown) return;
  let chapters = [];
  try {
    const r = await fetch("/api/lessons");
    chapters = (await r.json()).chapters || [];
  } catch (_) { /* server unreachable — fall through */ }
  if (notesShown) return;                       // notes arrived while fetching
  const notes = $("notes");
  if (!chapters.length) { notes.classList.add("empty"); notes.textContent = FALLBACK_EMPTY; return; }

  notes.classList.remove("empty");
  notes.classList.add("welcome");
  notes.innerHTML = "";
  const wel = document.createElement("div");
  wel.className = "wel";
  wel.innerHTML =
    '<div class="wel-hero"><div class="big">📚</div><h1>今天上哪一課?</h1>' +
    '<p>點一課直接開始 — 帶 <span class="chip">⚡ 已預載</span> 的課秒開,其他課要先備課(幾分鐘)。</p></div>';

  for (const ch of chapters) {
    const det = document.createElement("details");
    const cachedN = ch.lessons.filter(l => l.cached).length;
    if (cachedN > 0) det.open = true;
    const sum = document.createElement("summary");
    const tri = document.createElement("span"); tri.className = "tri"; tri.textContent = "▶";
    sum.appendChild(tri);
    sum.appendChild(document.createTextNode(ch.name.replace(/_/g, " ")));
    if (cachedN > 0) {
      const chip = document.createElement("span"); chip.className = "chip";
      chip.textContent = "⚡ " + cachedN + "/" + ch.lessons.length;
      sum.appendChild(chip);
    }
    det.appendChild(sum);
    const list = document.createElement("div");
    list.className = "lesson-list";
    for (const l of ch.lessons) {
      const row = document.createElement("button");
      row.type = "button"; row.className = "lesson-row";
      row.appendChild(document.createTextNode(l.name));
      if (l.cached) { const c = document.createElement("span"); c.className = "chip"; c.textContent = "⚡"; row.appendChild(c); }
      row.onclick = () => sendText("上 " + ch.name + "/" + l.name);
      list.appendChild(row);
    }
    det.appendChild(list);
    wel.appendChild(det);
  }
  const hint = document.createElement("div");
  hint.className = "wel-hint";
  hint.textContent = "也可以直接在右邊聊天,例如「預載 04 章接下來兩課」或任何系統設計問題。";
  wel.appendChild(hint);
  notes.appendChild(wel);
}

// ---------- chat panel ----------
const log = $("log");
function clearEmpty() { log.classList.remove("empty"); }
function scrollLog() { log.scrollTop = log.scrollHeight; }
function addUser(text) {
  clearEmpty();
  const row = document.createElement("div"); row.className = "msg user";
  const b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  row.appendChild(b); log.appendChild(row); scrollLog();
}
function addAssistant(text) {
  clearEmpty();
  const { rest } = extractGlossary(text);
  const row = document.createElement("div"); row.className = "msg bot";
  const b = document.createElement("div"); b.className = "bubble";
  b.innerHTML = renderMarkdown(rest, false);
  row.appendChild(b); log.appendChild(row);
  hydrateMermaid(b); hydrateTerms(b); scrollLog();
}
function addSystem(text) {
  clearEmpty();
  const row = document.createElement("div"); row.className = "msg system";
  const b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  row.appendChild(b); log.appendChild(row); scrollLog();
}

// ---------- thinking indicator ----------
// Shown the instant a message is sent; removed on the first reply/notes.
// At 20s it appends a setup hint (the old 15s system-bubble warning, inline).
let thinkRow = null, thinkTimer = null, thinkT0 = 0;
function showThinking() {
  clearEmpty();
  if (!thinkRow) {
    thinkRow = document.createElement("div");
    thinkRow.className = "msg bot thinking";
    thinkRow.innerHTML =
      '<div class="bubble"><span class="dots"><i></i><i></i><i></i></span>' +
      '<span class="think-label">教練思考中</span><span class="think-hint"></span></div>';
  }
  log.appendChild(thinkRow);            // (re)append → keeps it below the latest message
  thinkT0 = Date.now();
  thinkRow.querySelector(".think-label").textContent = "教練思考中";
  thinkRow.querySelector(".think-hint").textContent = "";
  if (thinkTimer) clearInterval(thinkTimer);
  thinkTimer = setInterval(() => {
    if (!thinkRow) return;
    const s = Math.round((Date.now() - thinkT0) / 1000);
    thinkRow.querySelector(".think-label").textContent = "教練思考中 · " + s + " 秒";
    if (s === 20) thinkRow.querySelector(".think-hint").textContent =
      "(一直沒回應的話,確認教練 session 是用 study-coach.cmd 啟動、且已批准 study-web 權限)";
  }, 1000);
  scrollLog();
}
function hideThinking() {
  if (thinkTimer) { clearInterval(thinkTimer); thinkTimer = null; }
  if (thinkRow) { thinkRow.remove(); thinkRow = null; }
}

// ---------- term card ----------
const card = $("card");
function openCard(id, anchor) {
  const def = GLOSS[id]; if (!def) return;
  $("cardTerm").textContent = def.term || id;
  const body = $("cardBody");
  body.innerHTML = renderMarkdown(def.short || "", true);
  hydrateTerms(body);
  $("cardDeeper").onclick = () => {
    const term = def.term || id;
    const q = def.deeper || ("請深入解釋:" + term);
    addUser("🔎 " + term);
    wsSend({ type: "ask", mode: "deeper", term, question: q, text: "🔎 " + term });
    closeCard();
  };
  card.style.display = "block";
  const r = anchor.getBoundingClientRect();
  const cw = card.offsetWidth, ch = card.offsetHeight;
  let left = r.left, top = r.bottom + 6;
  if (left + cw > innerWidth - 8) left = innerWidth - cw - 8;
  if (top + ch > innerHeight - 8) top = r.top - ch - 6;
  card.style.left = Math.max(8, left) + "px";
  card.style.top = Math.max(8, top) + "px";
}
function closeCard() { card.style.display = "none"; }

document.addEventListener("click", e => {
  const t = e.target.closest(".term");
  if (t) { openCard(t.dataset.defId, t); e.stopPropagation(); return; }
  if (!e.target.closest("#card")) closeCard();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeCard(); return; }
  const a = document.activeElement;
  if ((e.key === "Enter" || e.key === " ") && a && a.classList && a.classList.contains("term")) {
    e.preventDefault(); openCard(a.dataset.defId, a);
  }
});

// ---------- websocket ----------
let ws = null;
function setStatus(on) {
  $("dot").classList.toggle("on", on);
  $("status").textContent = on ? "已連線" : "已斷線,重連中…";
}
function wsSend(o) {
  if (ws && ws.readyState === 1) { ws.send(JSON.stringify(o)); showThinking(); }
  else addSystem("尚未連上座艙伺服器,正在重連…");
}
function sendText(text) {
  addUser(text);
  wsSend({ type: "ask", text });
}
function connect() {
  ws = new WebSocket("ws://" + location.host + "/ws");
  ws.onopen = () => setStatus(true);
  ws.onclose = () => { setStatus(false); setTimeout(connect, 1500); };
  ws.onerror = () => { try { ws.close(); } catch (_) {} };
  ws.onmessage = e => {
    let m; try { m = JSON.parse(e.data); } catch (_) { return; }
    if (m.type === "msg" && m.from === "assistant") { hideThinking(); addAssistant(m.text); }
    else if (m.type === "notes") { hideThinking(); renderNotes(m.markdown, m.lesson); }
    else if (m.type === "snapshot") { applySnapshot(m); }
  };
}
// Rebuild the whole UI from the server's authoritative state on every (re)connect.
// Idempotent: clears the chat log first, so transient reconnects don't duplicate
// and the page catches up on anything broadcast while it was disconnected.
function applySnapshot(m) {
  hideThinking();
  if (m.notes && m.notes.markdown) renderNotes(m.notes.markdown, m.notes.lesson);
  else loadWelcome();
  log.innerHTML = "";
  log.classList.add("empty");
  if (Array.isArray(m.history)) {
    for (const h of m.history) {
      if (h.from === "user") addUser(h.text);
      else addAssistant(h.text);
    }
  }
}
connect();
loadWelcome();      // WS snapshot will replace this if the server has notes

// ---------- input ----------
const form = $("form"), input = $("input");
form.onsubmit = e => {
  e.preventDefault();
  const text = input.value.trim(); if (!text) return;
  input.value = ""; input.style.height = "";
  sendText(text);
};
input.addEventListener("keydown", e => {
  // 忽略 IME 組字中(選字)按下的 Enter —— macOS 注音/拼音確認候選字時也會送 Enter,
  // isComposing 在部分瀏覽器不可靠,故同時檢查 keyCode === 229。
  if (e.isComposing || e.keyCode === 229) return;
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
input.addEventListener("input", () => {
  input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px";
});
</script>
